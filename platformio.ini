[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM4
monitor_speed = 9600

lib_deps = 
    pololu/VL53L0X@^1.3.1
    adafruit/Adafruit MPU6050@^2.2.6
    adafruit/Adafruit Unified Sensor@^1.1.15

build_src_filter = +<../test/MotionController_test.cpp>

build_flags = 
    -DCORE_DEBUG_LEVEL=0